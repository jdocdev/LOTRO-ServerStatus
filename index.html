<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTRO Server Status - Real-time Monitor</title>
    
    <!-- Primary Meta Tags -->
    <meta name="title" content="LOTRO Server Status - Real-time Monitor">
    <meta name="description" content="Check the real-time status, latency, and population of Lord of the Rings Online (LOTRO) servers, plus live Steam player charts.">
    <meta name="keywords" content="LOTRO, Lord of the Rings Online, Server Status, LOTRO servers, MMO status, LOTRO ping, Steam charts">
    <meta name="author" content="jdocdev">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#161b22">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pruebasjdoc.me/LOTRO-ServerStatus/">
    <meta property="og:title" content="LOTRO Server Status - Real-time Monitor">
    <meta property="og:description" content="Check the real-time status, latency, and population of Lord of the Rings Online (LOTRO) servers, plus live Steam player charts.">
    <meta property="og:image" content="logo.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://pruebasjdoc.me/LOTRO-ServerStatus/">
    <meta property="twitter:title" content="LOTRO Server Status - Real-time Monitor">
    <meta property="twitter:description" content="Check the real-time status, latency, and population of Lord of the Rings Online (LOTRO) servers, plus live Steam player charts.">
    <meta property="twitter:image" content="logo.png">

    <!-- Fonts & Scripts -->
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Just some nice glowing background vibes -->
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
    
    <div class="container">
        <header>
            <nav class="lang-selector" aria-label="Language Selector">
                <button onclick="changeLang('en')" class="lang-btn" data-lang="en" aria-label="Switch to English">EN</button>
                <button onclick="changeLang('es')" class="lang-btn" data-lang="es" aria-label="Cambiar a Español">ES</button>
                <button onclick="changeLang('fr')" class="lang-btn" data-lang="fr" aria-label="Passer en Français">FR</button>
                <button onclick="changeLang('de')" class="lang-btn" data-lang="de" aria-label="Auf Deutsch wechseln">DE</button>
            </nav>
            <div class="ring-icon">💍</div>
            <h1 data-i18n="title">LOTRO Server Status</h1>
            <p class="subtitle" data-i18n="subtitle">Real-time monitoring of Middle-earth</p>
        </header>

        <main>
        <div id="outage-banner" class="outage-banner">
            <div class="card-icon">⚠️</div>
            <span id="outage-text"></span>
        </div>
        <section class="dashboard" aria-label="Server Dashboard">
            <div class="dash-col">
                <div class="card ping-card">
                    <div class="card-icon">⚡</div>
                    <div class="card-content">
                        <h3 data-i18n="latency">Latency to NJ (Estimated)</h3>
                        <div id="user-info">
                            <span id="my-ping" class="ping-value loading">Calculating...</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="dash-col">
                <div class="card status-card">
                    <div class="card-icon">🌍</div>
                    <div class="card-content">
                        <h3 data-i18n="globalStatus">Global Status</h3>
                        <div class="global-status">
                            <span class="status-indicator global-indicator"></span>
                            <span id="global-text" data-i18n="verifying">Verifying...</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
        <div class="table-container">
            <table id="server-table">
                <thead>
                    <tr>
                        <th data-i18n="server">Server</th>
                        <th data-i18n="status">Status</th>
                        <th data-i18n="population">Population</th>
                    </tr>
                </thead>
                <tbody id="server-body">
                    <!-- Loading skeleton so it doesn't look broken while fetching -->
                    <tr class="skeleton-row"><td><div class="skeleton"></div></td><td><div class="skeleton"></div></td><td><div class="skeleton"></div></td></tr>
                    <tr class="skeleton-row"><td><div class="skeleton"></div></td><td><div class="skeleton"></div></td><td><div class="skeleton"></div></td></tr>
                    <tr class="skeleton-row"><td><div class="skeleton"></div></td><td><div class="skeleton"></div></td><td><div class="skeleton"></div></td></tr>
                </tbody>
            </table>
        </div>
        
        <section class="chart-section">
            <div class="card chart-card">
                <div class="chart-header">
                    <div class="card-icon">📈</div>
                    <h3 data-i18n="steamPlayers">Steam Players (Last 48 hrs)</h3>
                </div>
                <div class="chart-container">
                    <canvas id="steam-chart"></canvas>
                </div>
            </div>
        </section>
        </main>
        
        <footer>
            <p class="disclaimer" data-i18n="footerText">© jdocdev. Data updated every 10 min. If you like this, dropping a <a href="https://github.com/" target="_blank" style="color:var(--accent-gold);text-decoration:none;">star on GitHub</a> would be awesome ⭐</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
